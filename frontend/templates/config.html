<div class="space-y-6">
	<div>
		<h2 class="text-xl sm:text-2xl font-bold text-gray-800">Configuración RB</h2>
		<p class="text-xs sm:text-sm text-gray-500">Ajusta la conexión con MikroTik y el intervalo de recolección.</p>
	</div>

	{% if message %}
	<div class="bg-green-50 border border-green-200 text-green-800 rounded-lg px-4 py-3 text-xs sm:text-sm">
		{{ message }}
	</div>
	{% endif %}

	<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 sm:p-6 max-w-2xl">
		<form hx-post="/api/configuration" hx-target="#main-content" hx-swap="innerHTML" class="space-y-4">
			<div>
				<label for="mk_ip" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">IP del MikroTik</label>
				<input id="mk_ip" name="mk_ip" type="text" required value="{{ mk_ip }}"
					class="w-full px-3 sm:px-4 py-2 text-xs sm:text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
			</div>

			<div>
				<label for="mk_user" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">Usuario API</label>
				<input id="mk_user" name="mk_user" type="text" required value="{{ mk_user }}"
					class="w-full px-3 sm:px-4 py-2 text-xs sm:text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
			</div>

			<div>
				<label for="mk_pass" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">Contraseña API (opcional)</label>
				<input id="mk_pass" name="mk_pass" type="password" placeholder="Deja en blanco para mantener la actual"
					class="w-full px-3 sm:px-4 py-2 text-xs sm:text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
			</div>

			<div>
				<label for="intervalo_minutos" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">Intervalo (minutos)</label>
				<input id="intervalo_minutos" name="intervalo_minutos" type="number" min="1" max="1440" required value="{{ intervalo_minutos }}"
					class="w-full px-3 sm:px-4 py-2 text-xs sm:text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
			</div>

			<!-- Test connection feedback -->
			<div id="test-connection-result"></div>

			<div class="pt-2 flex flex-col sm:flex-row gap-2">
				<button type="submit" class="w-full sm:w-auto px-4 py-2 text-xs sm:text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors">
					<i class="fa-solid fa-save mr-1"></i> Guardar configuración
				</button>
				<button type="button" id="test-btn" class="w-full sm:w-auto px-4 py-2 text-xs sm:text-sm font-medium text-white bg-green-600 rounded-lg hover:bg-green-700 transition-colors">
					<i class="fa-solid fa-plug mr-1"></i> Testear conexión
				</button>
			</div>
		</form>
	</div>
</div>

<script>
document.getElementById('test-btn').addEventListener('click', async function() {
	const mk_ip = document.getElementById('mk_ip').value.trim();
	const mk_user = document.getElementById('mk_user').value.trim();
	const mk_pass = document.getElementById('mk_pass').value;
	const resultDiv = document.getElementById('test-connection-result');
	
	// Show loading state
	resultDiv.innerHTML = '<div class="bg-blue-50 border border-blue-200 text-blue-800 rounded-lg px-4 py-3 text-xs sm:text-sm flex items-center"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Testeando conexión...</div>';
	
	// Validate inputs
	if (!mk_ip || !mk_user) {
		resultDiv.innerHTML = '<div class="bg-yellow-50 border border-yellow-200 text-yellow-800 rounded-lg px-4 py-3 text-xs sm:text-sm"><i class="fa-solid fa-exclamation-triangle mr-1"></i> Por favor completa IP y Usuario</div>';
		return;
	}
	
	try {
		const formData = new FormData();
		formData.append('mk_ip', mk_ip);
		formData.append('mk_user', mk_user);
		formData.append('mk_pass', mk_pass);
		
		const response = await fetch('/api/test-connection', {
			method: 'POST',
			body: formData
		});
		
		const data = await response.json();
		
		if (data.success) {
			resultDiv.innerHTML = `<div class="bg-green-50 border border-green-200 text-green-800 rounded-lg px-4 py-3 text-xs sm:text-sm"><i class="fa-solid fa-circle-check mr-1"></i> ${data.message}</div>`;
		} else {
			resultDiv.innerHTML = `<div class="bg-red-50 border border-red-200 text-red-800 rounded-lg px-4 py-3 text-xs sm:text-sm"><i class="fa-solid fa-circle-xmark mr-1"></i> ${data.message}</div>`;
		}
	} catch (error) {
		resultDiv.innerHTML = `<div class="bg-red-50 border border-red-200 text-red-800 rounded-lg px-4 py-3 text-xs sm:text-sm"><i class="fa-solid fa-circle-xmark mr-1"></i> Error en la petición: ${error.message}</div>`;
	}
});
</script>
