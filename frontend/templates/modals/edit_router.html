<div class="fixed inset-0 bg-gray-900 bg-opacity-50 transition-opacity z-40 flex items-center justify-center animate-fade-in"
    id="edit-router-modal-backdrop">
    
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl mx-4 overflow-hidden z-50 transform transition-all animate-scale-in">
        <div class="bg-gray-50 px-4 sm:px-6 py-4 border-b border-gray-100 flex justify-between items-center">
            <h3 class="text-base sm:text-lg font-bold text-gray-800">
                <i class="fa-solid fa-server text-blue-500 mr-2"></i> Editar Router Mikrotik
            </h3>
            <button onclick="document.getElementById('modal-container').innerHTML = ''" 
                    class="text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fa-solid fa-xmark text-lg sm:text-xl"></i>
            </button>
        </div>

        <div class="px-4 sm:px-6 py-4 space-y-4">
            <!-- Form -->
            <form hx-post="/api/router/{{ router.id }}" 
                hx-target="#main-content" 
                hx-swap="innerHTML"
                hx-on::htmx:afterRequest="document.getElementById('modal-container').innerHTML = ''"
                class="space-y-4">
                
                <div>
                    <label for="nombre" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">Nombre / Alias del Router</label>
                    <input type="text" name="nombre" id="nombre" required placeholder="Ej: RB5009 Principal" value="{{ router.nombre }}"
                        class="w-full px-3 sm:px-4 py-2 text-xs sm:text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>

                <div>
                    <label for="mk_ip" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">IP del MikroTik</label>
                    <input type="text" name="mk_ip" id="mk_ip" required placeholder="Ej: 192.168.1.1" value="{{ router.ip_address }}"
                        class="w-full px-3 sm:px-4 py-2 text-xs sm:text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all font-mono">
                </div>

                <div>
                    <label for="mk_user" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">Usuario API</label>
                    <input type="text" name="mk_user" id="mk_user" required placeholder="Ej: api_user" value="{{ router.usuario }}"
                        class="w-full px-3 sm:px-4 py-2 text-xs sm:text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>

                <div>
                    <label for="mk_pass" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">Contraseña API</label>
                    <input type="password" name="mk_pass" id="mk_pass" placeholder="Dejar vacío para mantener la contraseña actual"
                        class="w-full px-3 sm:px-4 py-2 text-xs sm:text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>

                <div>
                    <label for="intervalo_minutos" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">Intervalo de Recolección (minutos)</label>
                    <input type="number" name="intervalo_minutos" id="intervalo_minutos" min="1" max="1440" required value="{{ router.intervalo_minutos }}"
                        class="w-full px-3 sm:px-4 py-2 text-xs sm:text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>

                <!-- Test connection feedback -->
                <div id="test-connection-result"></div>

                <div class="mt-6 flex flex-col sm:flex-row justify-end gap-2 sm:gap-3 pt-4 border-t border-gray-100">
                    <button type="button" id="test-btn"
                        class="w-full sm:w-auto px-4 py-2 text-xs sm:text-sm font-medium text-white bg-green-600 rounded-lg hover:bg-green-700 focus:outline-none transition-colors shadow-sm">
                        <i class="fa-solid fa-plug mr-1"></i> Testear conexión
                    </button>
                    <button type="button" onclick="document.getElementById('modal-container').innerHTML = ''"
                            class="w-full sm:w-auto px-4 py-2 text-xs sm:text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:outline-none transition-colors">
                        Cancelar
                    </button>
                    <button type="submit"
                            class="w-full sm:w-auto px-4 py-2 text-xs sm:text-sm font-medium text-white bg-blue-600 border border-transparent rounded-lg hover:bg-blue-700 focus:outline-none transition-colors shadow-sm">
                        Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('test-btn').addEventListener('click', async function () {
        const mk_ip = document.getElementById('mk_ip').value.trim();
        const mk_user = document.getElementById('mk_user').value.trim();
        const mk_pass = document.getElementById('mk_pass').value;
        const resultDiv = document.getElementById('test-connection-result');

        resultDiv.innerHTML = '<div class="bg-blue-50 border border-blue-200 text-blue-800 rounded-lg px-4 py-3 text-xs sm:text-sm flex items-center"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Testeando conexión...</div>';

        if (!mk_ip || !mk_user) {
            resultDiv.innerHTML = '<div class="bg-yellow-50 border border-yellow-200 text-yellow-800 rounded-lg px-4 py-3 text-xs sm:text-sm"><i class="fa-solid fa-exclamation-triangle mr-1"></i> Por favor completa IP y Usuario</div>';
            return;
        }

        try {
            const formData = new FormData();
            formData.append('mk_ip', mk_ip);
            formData.append('mk_user', mk_user);
            formData.append('mk_pass', mk_pass);

            const response = await fetch('/api/test-connection', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                resultDiv.innerHTML = `<div class="bg-green-50 border border-green-200 text-green-800 rounded-lg px-4 py-3 text-xs sm:text-sm"><i class="fa-solid fa-circle-check mr-1"></i> ${data.message}</div>`;
            } else {
                resultDiv.innerHTML = `<div class="bg-red-50 border border-red-200 text-red-800 rounded-lg px-4 py-3 text-xs sm:text-sm"><i class="fa-solid fa-circle-xmark mr-1"></i> ${data.message}</div>`;
            }
        } catch (error) {
            resultDiv.innerHTML = `<div class="bg-red-50 border border-red-200 text-red-800 rounded-lg px-4 py-3 text-xs sm:text-sm"><i class="fa-solid fa-circle-xmark mr-1"></i> Error en la petición: ${error.message}</div>`;
        }
    });
</script>
