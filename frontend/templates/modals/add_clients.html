<div class="fixed inset-0 bg-gray-900 bg-opacity-50 transition-opacity z-40 flex items-center justify-center animate-fade-in"
    id="add-from-list-modal-backdrop">

    <div
        class="bg-white rounded-xl shadow-2xl w-full max-w-3xl mx-4 overflow-hidden z-50 transform transition-all min-h-[60vh] max-h-[85vh] flex flex-col">
        <!-- Modal Header -->
        <div
            class="bg-gray-50 px-4 sm:px-6 py-4 border-b border-gray-100 flex justify-between items-center sticky top-0">
            <h3 class="text-base sm:text-lg font-bold text-gray-800">
                <i class="fa-solid fa-users-line text-blue-500 mr-2"></i> Agregar Clientes
            </h3>
            <button onclick="document.getElementById('modal-container').innerHTML = ''"
                class="text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fa-solid fa-xmark text-lg sm:text-xl"></i>
            </button>
        </div>

        <!-- Modal Body -->
        <div class="p-6 overflow-y-auto flex-1 space-y-4">
            <!-- Router Selector Dropdown -->
            <div
                class="bg-gray-50 p-3 rounded-lg border border-gray-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                <label for="modal-router-select" class="text-xs sm:text-sm font-semibold text-gray-700">Seleccionar
                    Router:</label>
                <select id="modal-router-select" onchange="loadData()"
                    class="w-full sm:w-auto px-3 sm:px-4 py-1.5 text-xs sm:text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    {% for r in routers %}
                    <option value="{{ r.id }}">{{ r.nombre }} ({{ r.ip_address }})</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Source Selector Tabs -->
            <div class="border-b border-gray-200">
                <nav class="flex space-x-6" aria-label="Tabs">
                    <button type="button" id="tab-lists" onclick="switchSource('lists')"
                        class="pb-3 px-1 font-semibold text-sm border-b-2 border-blue-500 text-blue-600 transition-colors flex items-center gap-2 outline-none select-none">
                        <i class="fa-solid fa-list-ul"></i>
                        <span>Listas de Direcciones</span>
                    </button>
                    <button type="button" id="tab-queues" onclick="switchSource('queues')"
                        class="pb-3 px-1 font-medium text-sm border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors flex items-center gap-2 outline-none select-none">
                        <i class="fa-solid fa-network-wired"></i>
                        <span>Colas Simples (Queues)</span>
                    </button>
                </nav>
            </div>

            <!-- Loading -->
            <div id="list-loading" class="text-center py-12">
                <div class="inline-block">
                    <i class="fa-solid fa-spinner fa-spin text-3xl text-blue-500 mb-2"></i>
                    <p id="list-loading-text" class="text-sm text-gray-600">Cargando listas...</p>
                </div>
            </div>

            <!-- Lists Selection Container -->
            <div id="lists-selection" class="hidden space-y-2">
                <div id="address-lists-container" class="space-y-3">
                    <!-- Loaded via JavaScript -->
                </div>
            </div>

            <!-- Error Alert -->
            <div id="list-error"
                class="hidden bg-red-50 border border-red-200 text-red-800 rounded-lg px-4 py-3 text-xs sm:text-sm flex items-start gap-2">
                <i class="fa-solid fa-circle-exclamation text-base mt-0.5"></i>
                <span id="list-error-text"></span>
            </div>
        </div>

        <!-- Modal Footer -->
        <div id="action-buttons"
            class="hidden px-6 py-4 bg-gray-50 border-t border-gray-100 flex flex-col sm:flex-row justify-end gap-2 sm:gap-3">
            <button type="button" onclick="document.getElementById('modal-container').innerHTML = ''"
                class="w-full sm:w-auto px-4 py-2 text-xs sm:text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                Cancelar
            </button>
            <button type="button" id="add-ips-btn" onclick="addSelectedIps()"
                class="w-full sm:w-auto px-4 py-2 text-xs sm:text-sm font-semibold text-white bg-blue-600 border border-transparent rounded-lg hover:bg-blue-700 transition-colors shadow-md">
                Agregar IPs Seleccionadas
            </button>
        </div>
    </div>
</div>

<script>
    let currentSource = 'lists';
    let existingIps = new Set();
    let selectedIps = new Map(); // Store as {ip: {ip, comment}}

    function switchSource(source) {
        if (currentSource === source) return;
        currentSource = source;

        // Update tab classes
        const tabLists = document.getElementById('tab-lists');
        const tabQueues = document.getElementById('tab-queues');

        if (source === 'lists') {
            tabLists.className = 'pb-3 px-1 font-semibold text-sm border-b-2 border-blue-500 text-blue-600 transition-colors flex items-center gap-2 outline-none select-none';
            tabQueues.className = 'pb-3 px-1 font-medium text-sm border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors flex items-center gap-2 outline-none select-none';
        } else {
            tabQueues.className = 'pb-3 px-1 font-semibold text-sm border-b-2 border-blue-500 text-blue-600 transition-colors flex items-center gap-2 outline-none select-none';
            tabLists.className = 'pb-3 px-1 font-medium text-sm border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors flex items-center gap-2 outline-none select-none';
        }

        loadData();
    }

    function loadData() {
        const listsContainer = document.getElementById('address-lists-container');
        const listsSelection = document.getElementById('lists-selection');
        const listLoading = document.getElementById('list-loading');
        const loadingText = document.getElementById('list-loading-text');
        const error = document.getElementById('list-error');

        selectedIps.clear();
        updateAddButton();

        listLoading.classList.remove('hidden');
        listsSelection.classList.add('hidden');
        error.classList.add('hidden');

        loadingText.textContent = currentSource === 'lists' ? 'Cargando listas...' : 'Cargando colas simples...';

        const routerSelect = document.getElementById('modal-router-select');
        if (!routerSelect || !routerSelect.value) {
            listLoading.classList.add('hidden');
            error.classList.remove('hidden');
            document.getElementById('list-error-text').textContent = 'No hay routers seleccionados o configurados.';
            return;
        }
        const routerId = routerSelect.value;

        // Get existing IPs first
        fetch('/api/views/existing-ips')
            .then(res => res.json())
            .then(data => {
                if (data.success && data.ips) {
                    existingIps = new Set(data.ips);
                }

                // Build the URL based on source
                const url = currentSource === 'lists'
                    ? `/api/views/address-lists-summary?router_id=${routerId}`
                    : `/api/views/queues-summary?router_id=${routerId}`;

                return fetch(url);
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                return res.json();
            })
            .then(data => {
                listLoading.classList.add('hidden');

                let listsData = [];
                if (data.success && data.lists && data.lists.length > 0) {
                    listsData = data.lists;
                }

                if (listsData.length > 0) {
                    listsContainer.innerHTML = '';
                    listsData.forEach((list, index) => {
                        const listId = `list-${index}`;
                        const ipContainerId = `ips-${index}`;

                        // Create list item
                        const listItem = document.createElement('div');
                        listItem.className = 'border border-gray-200 rounded-lg overflow-hidden bg-white shadow-sm';

                        // List header
                        const header = document.createElement('div');
                        header.className = 'bg-gray-50 p-3 cursor-pointer hover:bg-blue-50/50 transition-colors flex items-center justify-between';
                        header.onclick = (e) => {
                            if (e.target.closest('input[type="checkbox"]')) return; // Don't toggle if clicking on checkbox
                            const container = document.getElementById(ipContainerId);
                            const icon = header.querySelector('.toggle-icon');
                            container.classList.toggle('hidden');
                            icon.classList.toggle('fa-chevron-down');
                            icon.classList.toggle('fa-chevron-up');
                        };

                        const headerLeft = document.createElement('div');
                        headerLeft.className = 'flex items-center flex-1';

                        const chevron = document.createElement('i');
                        chevron.className = 'fa-solid fa-chevron-down toggle-icon text-gray-400 mr-2 text-xs';

                        const listCheckbox = document.createElement('input');
                        listCheckbox.type = 'checkbox';
                        listCheckbox.id = listId;
                        listCheckbox.className = 'h-4 w-4 text-blue-600 cursor-pointer rounded border-gray-300 focus:ring-blue-500';

                        const label = document.createElement('label');
                        label.htmlFor = listId;
                        label.className = 'ml-3 flex-1 font-semibold text-gray-700 cursor-pointer select-none text-xs sm:text-sm';
                        label.textContent = list.name;

                        headerLeft.appendChild(chevron);
                        headerLeft.appendChild(listCheckbox);
                        headerLeft.appendChild(label);

                        const countSpan = document.createElement('span');
                        countSpan.className = 'bg-blue-50 text-blue-600 text-xs font-semibold px-2 py-0.5 rounded-full border border-blue-100/50';
                        countSpan.textContent = `${list.count} IP${list.count !== 1 ? 's' : ''}`;

                        header.appendChild(headerLeft);
                        header.appendChild(countSpan);

                        // IPs container (initially hidden)
                        const ipsContainer = document.createElement('div');
                        ipsContainer.id = ipContainerId;
                        ipsContainer.className = 'hidden bg-white border-t border-gray-100 max-h-[40vh] overflow-y-auto';

                        // Add IPs
                        const addresses = list.addresses || [];
                        const ipCheckboxes = [];

                        addresses.forEach(addressItem => {
                            const ip = addressItem.ip;
                            const comment = addressItem.comment || '';
                            const isDuplicate = existingIps.has(ip);

                            const ipLabel = document.createElement('label');
                            ipLabel.className = `flex items-center p-3 border-b border-gray-100 cursor-pointer transition-colors hover:bg-gray-50 select-none ${isDuplicate ? 'bg-amber-50/50 opacity-60 cursor-not-allowed' : ''
                                }`;

                            const checkbox = document.createElement('input');
                            checkbox.type = 'checkbox';
                            checkbox.value = ip;
                            checkbox.dataset.comment = comment;
                            checkbox.disabled = isDuplicate;
                            checkbox.className = 'h-4 w-4 text-blue-600 cursor-pointer ml-8 rounded border-gray-300 focus:ring-blue-500';
                            checkbox.onchange = (e) => {
                                if (e.target.checked) {
                                    selectedIps.set(ip, { ip: ip, comment: comment });
                                } else {
                                    selectedIps.delete(ip);
                                }
                                // Update list checkbox state
                                const checkedCount = ipCheckboxes.filter(cb => cb.checked && !cb.disabled).length;
                                const selectableCount = ipCheckboxes.filter(cb => !cb.disabled).length;
                                listCheckbox.checked = checkedCount > 0 && checkedCount === selectableCount;
                                listCheckbox.indeterminate = checkedCount > 0 && checkedCount < selectableCount;
                                updateAddButton();
                            };

                            ipCheckboxes.push(checkbox);

                            const ipSpan = document.createElement('span');
                            ipSpan.className = 'ml-3 flex-1 font-mono text-xs sm:text-sm text-gray-800';
                            ipSpan.textContent = ip;

                            ipLabel.appendChild(checkbox);
                            ipLabel.appendChild(ipSpan);

                            if (comment) {
                                const commentSpan = document.createElement('span');
                                commentSpan.className = 'text-xs text-gray-500 italic ml-2 truncate max-w-[40%]';
                                commentSpan.textContent = `— ${comment}`;
                                ipLabel.appendChild(commentSpan);
                            }

                            if (isDuplicate) {
                                const badge = document.createElement('span');
                                badge.className = 'ml-auto text-[10px] font-semibold bg-amber-100 text-amber-800 px-2.5 py-0.5 rounded-full';
                                badge.textContent = 'Monitoreado';
                                ipLabel.appendChild(badge);
                            }

                            ipsContainer.appendChild(ipLabel);
                        });

                        // List checkbox: select/deselect all IPs
                        listCheckbox.onchange = (e) => {
                            const isChecked = e.target.checked;
                            ipCheckboxes.forEach(checkbox => {
                                if (!checkbox.disabled) {
                                    checkbox.checked = isChecked;
                                    const ip = checkbox.value;
                                    const comment = checkbox.dataset.comment;
                                    if (isChecked) {
                                        selectedIps.set(ip, { ip: ip, comment: comment });
                                    } else {
                                        selectedIps.delete(ip);
                                    }
                                }
                            });
                            listCheckbox.indeterminate = false;
                            updateAddButton();
                        };

                        listItem.appendChild(header);
                        listItem.appendChild(ipsContainer);
                        listsContainer.appendChild(listItem);
                    });
                    listsSelection.classList.remove('hidden');
                    document.getElementById('action-buttons').classList.remove('hidden');
                } else {
                    error.classList.remove('hidden');
                    const sourceName = currentSource === 'lists' ? 'listas de direcciones' : 'colas simples';
                    document.getElementById('list-error-text').textContent = `No se encontraron ${sourceName} configuradas en este router.`;
                }
            })
            .catch(err => {
                console.error('Error al cargar datos:', err);
                listLoading.classList.add('hidden');
                error.classList.remove('hidden');
                document.getElementById('list-error-text').textContent = 'Error al cargar los datos de MikroTik: ' + err.message;
            });
    }

    function updateAddButton() {
        const btn = document.getElementById('add-ips-btn');
        const hasSelection = selectedIps.size > 0;
        btn.disabled = !hasSelection;
        btn.classList.toggle('bg-gray-300', !hasSelection);
        btn.classList.toggle('text-gray-500', !hasSelection);
        btn.classList.toggle('cursor-not-allowed', !hasSelection);
        btn.classList.toggle('bg-blue-600', hasSelection);
        btn.classList.toggle('text-white', hasSelection);
        btn.classList.toggle('hover:bg-blue-700', hasSelection);
    }

    function addSelectedIps() {
        if (selectedIps.size === 0) {
            alert('Por favor selecciona al menos una dirección IP');
            return;
        }

        // Convert Map to array of objects with ip and comment
        const ipsData = Array.from(selectedIps.values()).map(item => ({
            ip: item.ip,
            nombre: item.comment || item.ip // Use comment/queue name as client name, fallback to IP
        }));

        const routerId = document.getElementById('modal-router-select').value;
        const btn = document.getElementById('add-ips-btn');

        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Agregando...';

        const formData = new FormData();
        formData.append('ips', JSON.stringify(ipsData));
        formData.append('router_id', routerId);

        fetch('/api/clients/bulk-add', {
            method: 'POST',
            body: formData
        })
            .then(res => res.json())
            .then(data => {
                btn.disabled = false;
                btn.innerHTML = 'Agregar IPs Seleccionadas';

                if (data.success) {
                    alert(`✓ ${data.message}`);
                    document.getElementById('modal-container').innerHTML = '';
                    htmx.ajax('GET', '/api/views/clients', '#main-content');
                } else {
                    alert(`✗ Error: ${data.message}`);
                }
            })
            .catch(err => {
                btn.disabled = false;
                btn.innerHTML = 'Agregar IPs Seleccionadas';
                alert('Error: ' + err.message);
            });
    }

    // Execute immediately to fetch lists
    loadData();
</script>
